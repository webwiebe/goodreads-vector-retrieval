services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - NODE_ENV=production
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs:ro
      - fastembed_cache:/app/.fastembed_cache
      - "./Goodreads Book Reviews.zip:/app/Goodreads Book Reviews.zip:ro"
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_data:
  fastembed_cache:
