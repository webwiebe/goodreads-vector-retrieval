services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - NODE_ENV=production
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - fastembed_cache:/app/.fastembed_cache
      - zip_data:/app/zip
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_data:
  fastembed_cache:
  zip_data:
